    max-managers-reached: "There can only be %max% manager(s) in a team"
    invite-cooldown: "Please wait %seconds% seconds before inviting this player again"
    team-no-longer-exists: "This team no longer exists"
    owner-cannot-leave: "Owners cannot leave their team. Transfer ownership first or delete the team"
    only-owner-promote: "Only the owner can promote players"
    only-owner-demote: "Only the owner can demote players"
    only-owner-delete: "Only the owner can delete the team"
    confirmation-expired: "This confirmation has expired or is invalid"
