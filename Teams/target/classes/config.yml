  mysql:
    host: "5.129.230.134"
    port: 3306
    database: "default_db"
    username: "gen_user"
    password: "ELWU!K3fW^0CflqmdNBbGO0z"
    useSSL: true

# Team ID (MID) settings
team-id:
  # Range for team IDs (min-max)
  min: 1
  max: 999
  # Format with leading zeros (true = 001, false = 1)
  use-leading-zeros: true

# Minimum playtime in hours required to create a team
minimum-playtime-hours: 5

# Maximum number of managers per team
max-managers: 1

# Date format for team creation date
date-format: "dd MMM yyyy"

# Message formats - Vanilla Minecraft style
messages:
  # Minimal prefixes
  prefix: ""
  error-prefix: "&c"
  success-prefix: "&a"
  info-prefix: "&e"

  # Team chat format - simple vanilla style
  team-chat-format: "&7[Team] &f%player_name%: %message%"

  # Role formats - minimal styling with stars
  roles:
    owner:
      prefix: "&e★ &f"
      color: "&6"
      display: "&7(Owner)"
    manager:
      prefix: "&e☆ &f"
      color: "&e"
      display: "&7(Manager)"
    member:
      prefix: ""
      color: "&f"
      display: ""

  # Command messages
  commands:
    # General
    not-in-team: "You are not in a team"
    already-in-team: "You are already in a team"
    no-permission: "You don't have permission to do that"
    usage: "Usage: %usage%"

    # Team creation
    team-created: "Team %team_name% created successfully"
    playtime-required: "You need to play for at least %required% to create a team"
    current-playtime: "Your current playtime: %playtime%"

    # Team deletion
    team-deleted: "Team deleted successfully"

