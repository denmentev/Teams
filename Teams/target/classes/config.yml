    description-not-set: "Not set"
    created: "Created: %date%"
    members-count: "Members: %count% member%s%"
    roster: "Roster:"
    member-online: "  %player_name% %role_display%"
    member-offline: "  %player_name% %role_display% &7(Offline)"

  # Confirmation messages
  confirmations:
    # Questions
    kick-question: "Are you sure you want to kick %target% from the team?"
    demote-question: "Are you sure you want to demote %target%?"
    promote-question: "Are you sure you want to promote %target% to Manager?"
