    promote: "&e/team promote&7/&edemote <player> &7- Promote/demote player"
    delete: "&e/team delete &7- Delete team"
    list: "&e/team list &7- List all teams"
    info: "&e/team info &7[name] &7- Team information"
    leave: "&e/team leave &7- Leave team"
    chat: "&e#&7<message> &7- Send team chat message"

