    player-joined: "%player_name% joined the team"
    player-left: "%player_name% left the team"
    player-kicked: "%player_name% was kicked from the team"
    member-promoted: "%player_name% promoted to %role%"
    member-demoted: "%player_name% demoted to %role%"
    role-changed-notify: "You have been %action% to %role%"

  # Validation messages
  validation:
    name-length: "Team name must be between %min% and %max% characters"
    name-taken: "A team with this name already exists"
    name-inappropriate: "This team name contains inappropriate content"
    name-invalid-characters: "Team name can only contain letters, numbers, spaces, underscores and hyphens"
    player-not-found: "Player not found"
    team-not-found: "Team not found"
